<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #4F46E5, #06B6D4);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:white;
            color:#4F46E5;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#E5E7EB;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This website is hosted from GitHub.</p>

        <a href="https://github.com/" class="btn">
            Visit GitHub
        </a>
    </div>

</body>
</html>
